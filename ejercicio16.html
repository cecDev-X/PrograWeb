<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white text-center">
                        <h4 class="mb-0">Calculadora Básica</h4>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="numero1" class="form-label">Número 1:</label>
                            <input type="text" id="numero1" class="form-control" placeholder="Ingresa el primer número">
                        </div>
                        <div class="mb-3">
                            <label for="numero2" class="form-label">Número 2:</label>
                            <input type="text" id="numero2" class="form-control" placeholder="Ingresa el segundo número">
                        </div>

                        <div class="d-flex justify-content-between mb-4">
                            <button class="btn btn-outline-primary" onclick="calcularOperacion('suma')">Sumar (+)</button>
                            <button class="btn btn-outline-danger" onclick="calcularOperacion('resta')">Restar (-)</button>
                            <button class="btn btn-outline-success" onclick="calcularOperacion('multiplicacion')">Multiplicar (x)</button>
                            <button class="btn btn-outline-warning" onclick="calcularOperacion('division')">Dividir (÷)</button>
                        </div>

                        <div class="mb-3">
                            <label for="resultado" class="form-label">Resultado:</label>
                            <input type="text" id="resultado" class="form-control fw-bold text-center" readonly>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/ejercicio16.js"></script>
</body>
</html>
