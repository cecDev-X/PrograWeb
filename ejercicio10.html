<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora: Celsius a Fahrenheit</title>
    <link href="/css/ejercicio10.css" rel="stylesheet">
    
</head>
<body>

    <div class="contenedor-calculadora">
        <h2>Conversor de Temperatura</h2>
        
        <div class="grupo-formulario">
            <label for="inputCelsius"> Celsius:</label>
            <input type="number" id="inputCelsius" placeholder="Ej: 25">
            <div id="errorMensaje" class="mensaje-error">Por favor, ingresa un valor numérico válido.</div>
        </div>

        <button id="btnConvertir">Convertir</button>

        <div class="grupo-formulario">
            <label for="inputFahrenheit"> Fahrenheit:</label>
            <input type="text" id="inputFahrenheit" readonly placeholder="Resultado">
        </div>
    </div>
    <script src="js/ejercicio10.js"></script>
    <a href="index.html" style="text-decoration: none; padding: 8px 16px; border: 1px solid blue; border-radius: 6px; color: #6dc5ea; background-color: white; font-family: sans-serif; font-size: 14px; transition: 0.3s;" onmouseover="this.style.backgroundColor='lightblue'; this.style.color='white'" onmouseout="this.style.backgroundColor='white'; this.style.color='#927dc1'">&#8592; Volver al Menú</a>

</body>
</html>
