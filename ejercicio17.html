<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tareas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white text-center">
                        <h4 class="mb-0">Gestión de Tareas</h4>
                    </div>
                    <div class="card-body">
                        <div class="input-group mb-3">
                            <input type="text" id="nueva-tarea" class="form-control" placeholder="Escribe una nueva tarea...">
                            <button class="btn btn-primary" id="btn-agregar" onclick="procesarNuevaTarea()">Agregar Tarea</button>
                        </div>
                        <ul id="lista-tareas" class="list-group">
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/ejercicio17.js"></script>
</body>
</html>
