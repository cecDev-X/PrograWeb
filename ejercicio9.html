<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | DevSolutions</title>
    <link rel="stylesheet" href="css/ejercicio9.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" >
</head>
<body>
    <div class="contenedor-formulario">
        <h1>Contactanos</h1>
        <p class="subtitulo">¿Tienes dudas? Escribenos y te responderemos en 24 h.</p>
        <form class="formulario">
            <div class="grupo-formulario">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Ej: Ana Lopez" required>
            </div>

            <div class="grupo-doble">
                <div class="grupo-formulario">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="ana@ejemplo.com" required>
                </div>
                <div class="grupo-formulario">
                    <label for="telefono">Telefono<span>(opcional)</span></label>
                    <input type="tel" id="telefono" placeholder="+55 951 123 4567">
                </div>
            </div>

            <div class="grupo-formulario">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" rows="5" placeholder="Describe tu consulta..." required></textarea>
            </div>

            <button type="submit" class="boton-enviar">
                Enviar mensaje<span>+</span>
            </button>

        </form>
    </div>
    <a href="index.html" style="text-decoration: none; padding: 8px 16px; border: 1px solid blue; border-radius: 6px; color: #6dc5ea; background-color: white; font-family: sans-serif; font-size: 14px; transition: 0.3s;" onmouseover="this.style.backgroundColor='lightblue'; this.style.color='white'" onmouseout="this.style.backgroundColor='white'; this.style.color='#927dc1'">&#8592; Volver al Menú</a>

</body>
</html>
